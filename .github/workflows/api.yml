name: API CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/**'
      - '.github/workflows/api.yml'
  pull_request:
    paths:
      - 'apps/api/**'
      - 'packages/**'
      - '.github/workflows/api.yml'

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: ${{ secrets.GCP_REGION }}
  ARTIFACT_REGISTRY: ${{ secrets.ARTIFACT_REGISTRY }}
  SERVICE_NAME: chamuco-api

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: chamuco_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8.15.1
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter api lint:check

      - name: Type check
        run: pnpm --filter api typecheck

      - name: Run tests with coverage
        run: pnpm --filter api test:cov

      - name: Build
        run: pnpm --filter api build

      - name: Dry run database migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/chamuco_test
        run: pnpm --filter api db:migrate

      - name: Upload coverage to GitHub
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-api
          path: apps/api/coverage/
          retention-days: 7

  deploy:
    needs: test-and-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev

      - name: Build Docker image
        run: |
          docker build \
            -f apps/api/Dockerfile \
            -t ${{ env.ARTIFACT_REGISTRY }}/api:${{ github.sha }} \
            -t ${{ env.ARTIFACT_REGISTRY }}/api:latest \
            .

      - name: Push Docker image to Artifact Registry
        run: |
          docker push ${{ env.ARTIFACT_REGISTRY }}/api:${{ github.sha }}
          docker push ${{ env.ARTIFACT_REGISTRY }}/api:latest

      - name: Run database migrations
        env:
          DATABASE_URL: postgresql://github-actions@chamuco-app-mn.iam@localhost:5433/chamuco_prod
        run: |
          # Download Cloud SQL Proxy
          wget https://dl.google.com/cloudsql/cloud_sql_proxy.linux.amd64 -O cloud_sql_proxy
          chmod +x cloud_sql_proxy

          # Start Cloud SQL Proxy in background
          ./cloud_sql_proxy chamuco-app-mn:us-central1:chamuco-postgres --port=5433 &
          PROXY_PID=$!

          # Wait for proxy to be ready
          sleep 5

          # Install dependencies (needed for migration tool)
          npm install -g pnpm@8.15.1
          pnpm install --frozen-lockfile

          # Run migrations
          pnpm --filter api db:migrate

          # Stop proxy
          kill $PROXY_PID

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image=${{ env.ARTIFACT_REGISTRY }}/api:${{ github.sha }} \
            --region=${{ env.GCP_REGION }} \
            --platform=managed \
            --quiet

      - name: Verify deployment
        run: |
          # Get service URL
          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.GCP_REGION }} \
            --format='value(status.url)')

          echo "Service URL: $SERVICE_URL"

          # Test health endpoint
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" $SERVICE_URL/health)

          if [ $HTTP_CODE -eq 200 ]; then
            echo "✅ Health check passed (HTTP $HTTP_CODE)"
          else
            echo "❌ Health check failed (HTTP $HTTP_CODE)"
            exit 1
          fi
