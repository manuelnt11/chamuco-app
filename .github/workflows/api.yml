name: API CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/**'
      - '.github/workflows/api.yml'
  pull_request:
    paths:
      - 'apps/api/**'
      - 'packages/**'
      - '.github/workflows/api.yml'

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: ${{ secrets.GCP_REGION }}
  ARTIFACT_REGISTRY: ${{ secrets.ARTIFACT_REGISTRY }}
  SERVICE_NAME: chamuco-api

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: chamuco_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies for vulnerabilities
        run: pnpm audit --audit-level high

      - name: Build workspace packages
        run: pnpm --filter @chamuco/shared-types --filter @chamuco/shared-utils build

      - name: Lint
        run: pnpm --filter api lint:check

      - name: Type check
        run: pnpm --filter api typecheck

      - name: Run unit tests with coverage
        run: pnpm --filter api test:cov

      - name: Apply database migrations (test DB)
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/chamuco_test
        run: pnpm --filter api db:migrate

      - name: Run integration (e2e) tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/chamuco_test
          # A valid JSON string is required by env validation at AppModule init.
          # Firebase is fully mocked in e2e tests; this value is never used.
          FIREBASE_SERVICE_ACCOUNT_JSON: '{}'
          GOOGLE_CLOUD_STORAGE_BUCKET: test-bucket
        run: pnpm --filter api test:e2e

      - name: Build
        run: pnpm --filter api build

      - name: Upload coverage to GitHub
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-api
          path: apps/api/coverage/
          retention-days: 7

  deploy:
    needs: test-and-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev

      - name: Build Docker image
        run: |
          docker build \
            -f apps/api/Dockerfile \
            -t ${{ env.ARTIFACT_REGISTRY }}/api:${{ github.sha }} \
            -t ${{ env.ARTIFACT_REGISTRY }}/api:latest \
            .

      - name: Push Docker image to Artifact Registry
        run: |
          docker push ${{ env.ARTIFACT_REGISTRY }}/api:${{ github.sha }}
          docker push ${{ env.ARTIFACT_REGISTRY }}/api:latest

      - name: Deploy to Cloud Run
        run: |
          cat > /tmp/env-vars.yaml <<'EOF'
          NODE_ENV: production
          CORS_ORIGIN: "https://chamucotravel.com,https://www.chamucotravel.com"
          GITHUB_REPO_OWNER: manuelnt11
          GITHUB_REPO_NAME: chamuco-app
          GITHUB_PROJECT_NUMBER: "4"
          EOF
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image=${{ env.ARTIFACT_REGISTRY }}/api:${{ github.sha }} \
            --region=${{ env.GCP_REGION }} \
            --project=${{ env.GCP_PROJECT_ID }} \
            --platform=managed \
            --service-account=chamuco-api-sa@chamuco-app-mn.iam.gserviceaccount.com \
            --add-cloudsql-instances=chamuco-app-mn:us-central1:chamuco-postgres \
            --vpc-connector=chamuco-vpc-connector \
            --vpc-egress=private-ranges-only \
            --env-vars-file=/tmp/env-vars.yaml \
            --set-secrets=FIREBASE_SERVICE_ACCOUNT_JSON=FIREBASE_SERVICE_ACCOUNT_JSON:latest,GEONAMES_USERNAME=GEONAMES_USERNAME:latest,GITHUB_TOKEN=GITHUB_TOKEN:latest,GOOGLE_CLOUD_STORAGE_BUCKET=GOOGLE_CLOUD_STORAGE_BUCKET:latest \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=10 \
            --timeout=300 \
            --allow-unauthenticated \
            --quiet

      - name: Verify deployment
        run: |
          # Get service URL
          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.GCP_REGION }} \
            --project=${{ env.GCP_PROJECT_ID }} \
            --format='value(status.url)')

          echo "Service URL: $SERVICE_URL"

          # Test health endpoint
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" $SERVICE_URL/health)

          if [ $HTTP_CODE -eq 200 ]; then
            echo "✅ Health check passed (HTTP $HTTP_CODE)"
          else
            echo "❌ Health check failed (HTTP $HTTP_CODE)"
            exit 1
          fi
