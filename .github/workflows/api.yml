name: API CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/**'
      - '.github/workflows/api.yml'
  pull_request:
    paths:
      - 'apps/api/**'
      - 'packages/**'
      - '.github/workflows/api.yml'

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: ${{ secrets.GCP_REGION }}
  ARTIFACT_REGISTRY: ${{ secrets.ARTIFACT_REGISTRY }}
  SERVICE_NAME: chamuco-api

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: chamuco_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.33.0
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies for vulnerabilities
        run: pnpm audit --audit-level high

      - name: Lint
        run: pnpm --filter api lint:check

      - name: Type check
        run: pnpm --filter api typecheck

      - name: Run tests with coverage
        run: pnpm --filter api test:cov

      - name: Build
        run: pnpm --filter api build

      - name: Dry run database migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/chamuco_test
        run: pnpm --filter api db:migrate

      - name: Upload coverage to GitHub
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-api
          path: apps/api/coverage/
          retention-days: 7

  deploy:
    needs: test-and-build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev

      - name: Build Docker image
        run: |
          docker build \
            -f apps/api/Dockerfile \
            -t ${{ env.ARTIFACT_REGISTRY }}/api:${{ github.sha }} \
            -t ${{ env.ARTIFACT_REGISTRY }}/api:latest \
            .

      - name: Push Docker image to Artifact Registry
        run: |
          docker push ${{ env.ARTIFACT_REGISTRY }}/api:${{ github.sha }}
          docker push ${{ env.ARTIFACT_REGISTRY }}/api:latest

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq netcat-openbsd postgresql-client

      - name: Setup pnpm for migrations
        uses: pnpm/action-setup@v3
        with:
          version: 10.33.0
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run database migrations
        env:
          DATABASE_URL: postgresql://github-actions@chamuco-app-mn.iam@localhost:5433/chamuco_prod
        run: |
          set -e  # Exit on any error

          # Download Cloud SQL Proxy v2
          echo "📥 Downloading Cloud SQL Proxy v2..."
          wget -q https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.14.2/cloud-sql-proxy.linux.amd64 -O cloud_sql_proxy
          chmod +x cloud_sql_proxy

          # Start Cloud SQL Proxy v2 (using private IP)
          echo "🔌 Starting Cloud SQL Proxy v2 (private IP)..."
          ./cloud_sql_proxy \
            --port 5433 \
            --private-ip \
            --quiet \
            chamuco-app-mn:us-central1:chamuco-postgres &
          PROXY_PID=$!

          echo "⏳ Waiting for Cloud SQL Proxy to be ready (PID: $PROXY_PID)..."

          # Wait for proxy to be ready (up to 30 seconds)
          for i in {1..30}; do
            if nc -z localhost 5433 2>/dev/null; then
              echo "✅ Cloud SQL Proxy is ready on port 5433"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "❌ Cloud SQL Proxy failed to start within 30 seconds"
              kill $PROXY_PID 2>/dev/null || true
              exit 1
            fi
            echo "  Attempt $i/30..."
            sleep 1
          done

          # Test database connection (non-blocking, for logging only)
          echo "🔍 Testing database connection..."
          if psql "$DATABASE_URL" -c "SELECT version();" 2>&1; then
            echo "✅ Direct psql connection successful"
          else
            echo "⚠️  Direct psql connection failed (this is OK, IAM auth via Drizzle will work)"
          fi
          echo ""

          # Run migrations
          echo "🚀 Running database migrations..."
          echo "   Connection: $DATABASE_URL"
          echo ""
          if pnpm --filter api db:migrate; then
            echo ""
            echo "✅ Migrations completed successfully"
          else
            echo ""
            echo "❌ Migrations failed"
            echo ""
            echo "Checking proxy status..."
            ps aux | grep cloud_sql_proxy | grep -v grep || echo "Proxy is not running"
            echo ""
            kill $PROXY_PID 2>/dev/null || true
            exit 1
          fi

          # Stop proxy
          echo "🛑 Stopping Cloud SQL Proxy..."
          kill $PROXY_PID 2>/dev/null || true
          wait $PROXY_PID 2>/dev/null || true
          echo "✅ Migration step completed"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image=${{ env.ARTIFACT_REGISTRY }}/api:${{ github.sha }} \
            --region=${{ env.GCP_REGION }} \
            --platform=managed \
            --quiet

      - name: Verify deployment
        run: |
          # Get service URL
          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.GCP_REGION }} \
            --format='value(status.url)')

          echo "Service URL: $SERVICE_URL"

          # Test health endpoint
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" $SERVICE_URL/health)

          if [ $HTTP_CODE -eq 200 ]; then
            echo "✅ Health check passed (HTTP $HTTP_CODE)"
          else
            echo "❌ Health check failed (HTTP $HTTP_CODE)"
            exit 1
          fi
