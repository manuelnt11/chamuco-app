packages:
  - 'apps/*'
  - 'packages/*'
allowBuilds:
  '@firebase/util': true
  '@nestjs/core': true
  '@scarf/scarf': true
  '@swc/core': true
  esbuild: true
  msw: true
  protobufjs: true
  sharp: true
  unrs-resolver: true

catalog:
  '@types/node': ^25.6.0
  '@typescript-eslint/eslint-plugin': ^8.59.1
  '@typescript-eslint/parser': ^8.59.1
  eslint: ^10.2.1
  eslint-config-prettier: ^10.0.1
  eslint-plugin-i18next: ^6.1.4
  eslint-plugin-prettier: ^5.5.5
  prettier: ^3.8.1
  typescript: ^6.0.2
